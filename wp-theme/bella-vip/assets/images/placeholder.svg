<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="600" fill="#fdf7f3" />
  
  <!-- Subtle decorative grid/circles -->
  <circle cx="400" cy="300" r="220" fill="none" stroke="#e3c0b7" stroke-width="1" opacity="0.5" />
  <circle cx="400" cy="300" r="180" fill="none" stroke="#df9a81" stroke-width="1" opacity="0.3" />
  
  <!-- Minimalist Line Art Flower (representing Spa & Beauty) -->
  <g transform="translate(400, 270) scale(1.5)">
    <!-- Stem/Leaf -->
    <path d="M 0,80 Q -10,30 0,0" fill="none" stroke="#df9a81" stroke-width="2" stroke-linecap="round"/>
    <path d="M 0,40 Q -25,25 -10,15 Q -5,25 0,40" fill="#e3c0b7" stroke="#df9a81" stroke-width="1.5" />
    <path d="M 0,55 Q 25,45 10,35 Q 5,45 0,55" fill="#e3c0b7" stroke="#df9a81" stroke-width="1.5" />
    
    <!-- Flower Petals -->
    <path d="M 0,0 C -30,-30 -50,0 0,0 C 50,0 30,-30 0,0" fill="#e3c0b7" stroke="#df9a81" stroke-width="2" opacity="0.8"/>
    <path d="M 0,0 C -30,30 -50,0 0,0 C 50,0 30,30 0,0" fill="#e3c0b7" stroke="#df9a81" stroke-width="2" opacity="0.8"/>
    <path d="M 0,0 C -30,-30 0,-50 0,0 C 0,50 30,30 0,0" fill="#f4e9e5" stroke="#df9a81" stroke-width="2" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="#df9a81" />
  </g>
  
  <!-- Text Logo Placeholder -->
  <text x="400" y="460" font-family="'Playfair Display', serif" font-size="28" fill="#292524" font-weight="bold" text-anchor="middle" letter-spacing="2">Bella VIP</text>
  <text x="400" y="490" font-family="'Inter', sans-serif" font-size="14" fill="#df9a81" text-anchor="middle" letter-spacing="1">ESPAÇO DE BELEZA &amp; BEM-ESTAR</text>
</svg>
